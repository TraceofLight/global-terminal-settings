# Minimal tmux settings for local use with WezTerm.
# Keep WezTerm as the primary tab/pane UI; use tmux as the inner session layer.

set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi

# Prefer modern terminal capabilities when available.
set -g default-terminal "tmux-256color"
set -as terminal-features ",tmux-256color:RGB"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",wezterm:RGB"

# Reload config without restarting tmux.
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
